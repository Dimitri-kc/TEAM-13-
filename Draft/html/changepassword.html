<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | LOFT & LIVING</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ibarra+Real+Nova:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/header_footer_style.css">
  <link rel="stylesheet" href="../css/signup.style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #EAE8E4;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: #111;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .message {
      margin-top: 14px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .message.error {
      background: #fdecec;
      color: #8b1d1d;
      border: 1px solid #f4bcbc;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Change Password</h1>
  <p>You must change your password before continuing.</p>

  <form id="changePasswordForm">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" required>
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" required>
    </div>

    <button type="submit">Update Password</button>
  </form>

  <div id="msg" class="message error"></div>
</div>

<script>
  const API_URL = "/Team-13-/Draft/backend/routes/userRoutes.php";
  const form = document.getElementById("changePasswordForm");
  const msg = document.getElementById("msg");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    msg.style.display = "none";

    const p1 = document.getElementById("newPassword").value;
    const p2 = document.getElementById("confirmPassword").value;

    if (p1 !== p2) {
      msg.textContent = "Passwords do not match.";
      msg.style.display = "block";
      return;
    }

    const formData = new FormData();
    formData.append("action", "change_password");
    formData.append("newPassword", p1);

    try {
      const res = await fetch(API_URL, { method: "POST", body: formData });
      const text = (await res.text()).trim();

      if (text.toLowerCase().includes("success")) {
        window.location.href = "homepage.html";
        return;
      }

      msg.textContent = text || "Failed to update password.";
      msg.style.display = "block";
    } catch {
      msg.textContent = "Server error. Please try again.";
      msg.style.display = "block";
    }
  });
</script>

</body>
</html>
